    # ==========================================
    # SCHEMAS DE DETALLES DE PAGO
    # ==========================================

    DetallesCuentaBancaria:
      type: object
      required:
        - cbu_alias
        - titular
      properties:
        cbu_alias:
          type: string
          example: "0170001234567890123456"
          description: CBU o Alias de la cuenta
        titular:
          type: string
          example: "Milagros Peledrotti"
        banco:
          type: string
          example: "Banco Galicia"

    DetallesTarjeta:
      type: object
      required:
        - numero_tarjeta
        - cvv
      properties:
        numero_tarjeta:
          type: string
          example: "4242424242424242"
          minLength: 13
          maxLength: 19
        cvv:
          type: string
          example: "123"
          minLength: 3
          maxLength: 4
        fecha_expiracion:
          type: string
          example: "12/25"
          pattern: '^\d{2}/\d{2}$'
        titular:
          type: string
          example: "MILAGROS PELEDROTTI"

    DetallesCheque:
      type: object
      required:
        - numero_cheque
        - banco_emisor
      properties:
        numero_cheque:
          type: string
          example: "12345678"
        banco_emisor:
          type: string
          example: "Banco Galicia"
        fecha_emision:
          type: string
          format: date

    # ==========================================
    # SCHEMAS DE ERROR
    # ==========================================

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Descripción del error"
