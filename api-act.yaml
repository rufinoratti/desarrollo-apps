openapi: 3.0.0
info:
  title: Rematix - Desarrollo de Aplicaciones
  description: |
    API RESTful para la plataforma de subastas Rematix.
    
    Esta API permite gestionar el ciclo completo de subastas online, incluyendo:
    - Registro y autenticación de usuarios
    - Exploración de subastas y catálogos
    - Sistema de pujas en tiempo real
    - Gestión de pagos y billetera digital
    - Perfil de usuario y estadísticas
    - Sistema de notificaciones
    
    Documentación del Trabajo Práctico.
  version: 1.0.3
  contact:
    name: Equipo Rematix
    email: soporte@rematix.com

servers:
  - url: https://api.rematix.com/v1
    description: Servidor de producción
  - url: https://api-staging.rematix.com/v1
    description: Servidor de pruebas

tags:
  - name: 1. Autenticación y Registro
    description: Endpoints para registro de usuarios, login y recuperación de contraseña
  - name: 2. Home y Exploración
    description: Pantalla principal y exploración de subastas
  - name: 3. Catálogo e Ítems
    description: Gestión de catálogos y detalles de artículos
  - name: 4. Billetera y Pagos
    description: Administración de medios de pago
  - name: 5. Motor de Pujas
    description: Sistema de pujas y ofertas en tiempo real
  - name: 6. Perfil y Cuenta
    description: Gestión del perfil de usuario
  - name: 7. Notificaciones
    description: Sistema de notificaciones y alertas
  - name: 8. Checkout y Liquidación
    description: Proceso de pago y liquidación de lotes ganados
  - name: 9. Vendedor (Mis Bienes)
    description: Gestión de artículos en venta

paths:
  # ==========================================
  # 1. AUTENTICACIÓN Y REGISTRO
  # ==========================================
  
  /auth/registro/paso1:
    post:
      tags:
        - 1. Autenticación y Registro
      summary: "Paso 1: Datos Personales"
      description: |
        Recibe la información de la primera pantalla del proceso de registro
        y crea un registro temporal en el sistema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistroPaso1Request"
            examples:
              ejemplo_completo:
                summary: Registro básico
                value:
                  nombre_completo: Milagros Peledrotti
                  documento: "35111222"
                  direccion: Av. Alvear 1820
                  pais_residencia: Argentina
                  email: usuario@mail.com
      responses:
        "201":
          description: Registro temporal creado exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistroPaso1Response"
              examples:
                respuesta_exitosa:
                  value:
                    registro_id: 105
                    mensaje: "Registro creado. Continúe con el paso 2."
        "400":
          description: Datos inválidos o incompletos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                email_duplicado:
                  value:
                    error: "El email ya está registrado"
                    codigo: "EMAIL_DUPLICADO"
        "422":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/registro/paso2:
    post:
      tags:
        - 1. Autenticación y Registro
      summary: "Paso 2: Creación de Contraseña"
      description: |
        Asocia una contraseña al registro temporal creado en el paso 1.
        La contraseña debe cumplir con los requisitos de seguridad.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistroPaso2Request"
            examples:
              ejemplo_basico:
                value:
                  registro_id: 105
                  password: "MiClave123!"
      responses:
        "200":
          description: Contraseña asociada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Contraseña creada correctamente. Continúe con el paso 3."
        "400":
          description: Contraseña no cumple con los requisitos de seguridad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                password_debil:
                  value:
                    error: "La contraseña debe tener al menos 8 caracteres, una mayúscula y un número"
                    codigo: "PASSWORD_DEBIL"
        "404":
          description: Registro temporal no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/registro/paso3:
    post:
      tags:
        - 1. Autenticación y Registro
      summary: "Paso 3: Validación de Identidad"
      description: |
        Sube las imágenes del DNI (frente y dorso) para validación de identidad.
        Las imágenes serán procesadas por el sistema de KYC.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RegistroPaso3Request"
      responses:
        "200":
          description: Identidad validada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Documentos recibidos. Validación en proceso."
                  estado_validacion:
                    type: string
                    enum: [EN_REVISION, APROBADO, RECHAZADO]
                    example: EN_REVISION
        "400":
          description: Imágenes inválidas o ilegibles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Registro no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Archivos demasiado grandes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/registro/paso4-pago:
    post:
      tags:
        - 1. Autenticación y Registro
      summary: "Paso 4: Agregar Medio de Pago Inicial"
      description: |
        Vincula un medio de pago inicial a la cuenta.
        Puede ser tarjeta de crédito, cuenta bancaria o cheque.
        Este paso finaliza el proceso de registro.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistroPaso4Request"
            examples:
              con_tarjeta:
                summary: Registro con tarjeta
                value:
                  registro_id: 105
                  tipo_pago: TARJETA
                  detalles:
                    numero_tarjeta: "4242424242424242"
                    cvv: "123"
                    fecha_expiracion: "12/25"
                    titular: "MILAGROS PELEDROTTI"
              con_cuenta_bancaria:
                summary: Registro con cuenta bancaria
                value:
                  registro_id: 105
                  tipo_pago: CUENTA_BANCARIA
                  detalles:
                    cbu_alias: "0170001234567890123456"
                    titular: "Milagros Peledrotti"
                    banco: "Banco Galicia"
      responses:
        "201":
          description: Medio de pago vinculado. Registro finalizado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Registro completado exitosamente"
                  usuario_id:
                    type: string
                    example: "uuid-user-001"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Datos de pago inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Registro no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags:
        - 1. Autenticación y Registro
      summary: Iniciar Sesión
      description: |
        Autentica a un usuario registrado y devuelve un token JWT
        para acceder a endpoints protegidos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              login_email:
                summary: Login con email
                value:
                  email: usuario@mail.com
                  password: MiClave123!
      responses:
        "200":
          description: Login exitoso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                login_exitoso:
                  value:
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    usuario_id: "uuid-user-001"
                    nombre: "Milagros Peledrotti"
        "401":
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                credenciales_invalidas:
                  value:
                    error: "Email o contraseña incorrectos"
                    codigo: "CREDENCIALES_INVALIDAS"
        "403":
          description: Cuenta bloqueada o pendiente de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags:
        - 1. Autenticación y Registro
      summary: Cerrar Sesión
      description: Invalida el token JWT actual del usuario.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sesión cerrada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Sesión cerrada correctamente"
        "401":
          description: Token inválido o expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/recuperar-clave:
    post:
      tags:
        - 1. Autenticación y Registro
      summary: Recuperar Contraseña
      description: |
        Envía un email con instrucciones para restablecer la contraseña.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecuperarClaveRequest"
            examples:
              solicitud_recuperacion:
                value:
                  email: usuario@mail.com
      responses:
        "200":
          description: Email de recuperación enviado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Si el email existe, recibirás instrucciones para restablecer tu contraseña"
        "400":
          description: Email inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Demasiadas solicitudes. Intente más tarde.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /paises:
    get:
      tags:
        - 1. Autenticación y Registro
      summary: Catálogo de Países
      description: |
        Devuelve la lista completa de países disponibles para desplegables
        en formularios de registro.
      security: []
      responses:
        "200":
          description: Lista de países obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pais"
              examples:
                lista_paises:
                  value:
                    - id: 1
                      nombre: Argentina
                      codigo_iso: AR
                    - id: 2
                      nombre: Uruguay
                      codigo_iso: UY
                    - id: 3
                      nombre: Chile
                      codigo_iso: CL
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bancos:
    get:
      tags:
        - 1. Autenticación y Registro
      summary: Catálogo de Bancos
      description: |
        Devuelve la lista de bancos disponibles para vinculación de cuentas bancarias.
      security: []
      responses:
        "200":
          description: Lista de bancos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banco"
              examples:
                lista_bancos:
                  value:
                    - id: 1
                      nombre: Banco Galicia
                      codigo: "007"
                    - id: 2
                      nombre: Banco Nación
                      codigo: "011"
                    - id: 3
                      nombre: BBVA Argentina
                      codigo: "017"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================
  # 2. HOME Y EXPLORACIÓN
  # ==========================================

  /categorias:
    get:
      tags:
        - 2. Home y Exploración
      summary: Obtener Categorías
      description: |
        Devuelve la lista completa de categorías disponibles
        (Arte, Joyería, Relojes, Automóviles, etc.).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de categorías obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Categoria"
              examples:
                categorias_disponibles:
                  value:
                    - id: 1
                      nombre: Arte
                      icono_url: https://cdn.rematix.com/icons/arte.svg
                    - id: 2
                      nombre: Joyería
                      icono_url: https://cdn.rematix.com/icons/joyeria.svg
                    - id: 3
                      nombre: Relojes
                      icono_url: https://cdn.rematix.com/icons/relojes.svg
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subastas:
    get:
      tags:
        - 2. Home y Exploración
      summary: Explorador completo de subastas
      description: |
        Devuelve el listado completo de subastas disponibles.
        Sirve tanto para el Feed de Home como para la pestaña de Exploración.
        Permite filtrar por categoría.
      security:
        - bearerAuth: []
      parameters:
        - name: categoria_id
          in: query
          description: ID de categoría para filtrar resultados
          required: false
          schema:
            type: integer
            example: 1
        - name: estado
          in: query
          description: Estado de la subasta
          required: false
          schema:
            type: string
            enum: [EN_VIVO, PROXIMAMENTE, FINALIZADA]
        - name: limite
          in: query
          description: Número máximo de resultados
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: pagina
          in: query
          description: Número de página para paginación
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: Listado obtenido correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subastas:
                    type: array
                    items:
                      $ref: "#/components/schemas/SubastaResumen"
                  total:
                    type: integer
                    description: Total de subastas disponibles
                  pagina_actual:
                    type: integer
                  total_paginas:
                    type: integer
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================
  # 3. CATÁLOGO E ÍTEMS
  # ==========================================

  /subastas/{id}/catalogo:
    get:
      tags:
        - 3. Catálogo e Ítems
      summary: Obtener artículos de una subasta
      description: |
        Devuelve la lista de lotes/artículos de una subasta específica
        para mostrar en la vista de catálogo. Incluye búsqueda por texto.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID único de la subasta
          required: true
          schema:
            type: string
            example: "uuid-sub-002"
        - name: q
          in: query
          description: Término de búsqueda (ej. 'Ferrari', 'Rolex')
          required: false
          schema:
            type: string
            example: Ferrari
        - name: orden
          in: query
          description: Orden de los resultados
          required: false
          schema:
            type: string
            enum: [precio_asc, precio_desc, tiempo_asc, lote_numero]
            default: lote_numero
      responses:
        "200":
          description: Catálogo cargado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subasta_info:
                    type: object
                    properties:
                      id:
                        type: string
                      titulo:
                        type: string
                      estado:
                        type: string
                  articulos:
                    type: array
                    items:
                      $ref: "#/components/schemas/ArticuloResumen"
                  total_articulos:
                    type: integer
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Subasta no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items/{id}:
    get:
      tags:
        - 3. Catálogo e Ítems
      summary: Detalle completo del artículo
      description: |
        Devuelve toda la información del artículo incluyendo:
        - Ficha técnica completa
        - Galería de imágenes
        - Descripción detallada
        - Estado actual de la puja
        - Historial de propietarios (si aplica)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID único del artículo/ítem
          required: true
          schema:
            type: string
            example: "uuid-item-442"
      responses:
        "200":
          description: Detalles del ítem obtenidos correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticuloDetalle"
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Artículo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items/{id}/favorito:
    post:
      tags:
        - 3. Catálogo e Ítems
      summary: Alternar Favorito (Corazón)
      description: |
        Agrega o quita el artículo de la lista de favoritos del usuario.
        Actúa como toggle (si está marcado, lo desmarca y viceversa).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID del artículo
          required: true
          schema:
            type: string
            example: "uuid-item-442"
      responses:
        "200":
          description: Estado de favorito actualizado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  es_favorito:
                    type: boolean
                    description: Estado actual después del toggle
                    example: true
                  mensaje:
                    type: string
                    example: "Artículo agregado a favoritos"
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Artículo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================
  # 4. BILLETERA Y PAGOS
  # ==========================================

  /billetera/medios-pago:
    get:
      tags:
        - 4. Billetera y Pagos
      summary: Listar Medios de Pago
      description: |
        Devuelve todos los medios de pago vinculados a la cuenta del usuario
        (tarjetas, cuentas bancarias, cheques).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Listado obtenido exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedioPago"
              examples:
                medios_de_pago:
                  value:
                    - id: "pago-uuid-123"
                      tipo_pago: TARJETA
                      descripcion_corta: "Tarjeta Visa **** 4242"
                      estado: VERIFICADA
                      es_principal: true
                    - id: "pago-uuid-456"
                      tipo_pago: CUENTA_BANCARIA
                      descripcion_corta: "Banco Galicia - CBU ****3456"
                      estado: VERIFICADA
                      es_principal: false
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - 4. Billetera y Pagos
      summary: Agregar Nuevo Medio de Pago
      description: |
        Vincula un nuevo medio de pago a la cuenta del usuario.
        Puede ser tarjeta de crédito, cuenta bancaria o cheque.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgregarMedioPagoRequest"
            examples:
              nueva_tarjeta:
                summary: Agregar tarjeta
                value:
                  tipo_pago: TARJETA
                  detalles:
                    numero_tarjeta: "4242424242424242"
                    cvv: "123"
                    fecha_expiracion: "12/25"
                    titular: "JUAN PEREZ"
              nueva_cuenta:
                summary: Agregar cuenta bancaria
                value:
                  tipo_pago: CUENTA_BANCARIA
                  detalles:
                    cbu_alias: "0170001234567890123456"
                    titular: "Juan Perez"
                    banco: "Banco Galicia"
      responses:
        "201":
          description: Medio de pago agregado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "pago-uuid-789"
                  mensaje:
                    type: string
                    example: "Medio de pago agregado correctamente"
                  estado:
                    type: string
                    enum: [VERIFICADA, EN_REVISION, RECHAZADA]
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billetera/medios-pago/{id}:
    delete:
      tags:
        - 4. Billetera y Pagos
      summary: Eliminar Medio de Pago
      description: |
        Elimina un medio de pago vinculado a la cuenta.
        No se puede eliminar si es el único medio de pago o si hay pagos pendientes.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID del medio de pago a eliminar
          required: true
          schema:
            type: string
            example: "pago-uuid-123"
      responses:
        "200":
          description: Eliminado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Medio de pago eliminado correctamente"
        "400":
          description: No se puede eliminar (es el único o tiene pagos pendientes)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unico_medio:
                  value:
                    error: "No puedes eliminar tu único medio de pago"
                    codigo: "UNICO_MEDIO_PAGO"
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Medio de pago no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

