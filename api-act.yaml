  /pujas:
    post:
      tags:
        - 5. Motor de Pujas
      summary: Realizar una Puja
      description: |
        Registra una nueva oferta sobre un artículo en subasta.
        Valida que el monto sea mayor al actual y que el usuario
        tenga fondos o garantías suficientes.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RealizarPujaRequest"
            examples:
              puja_normal:
                summary: Puja estándar
                value:
                  item_id: "uuid-item-442"
                  monto_ofertado: 51000000
      responses:
        "201":
          description: Puja registrada exitosamente.
          content:
