            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Artículo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ==========================================
# COMPONENTES REUTILIZABLES
# ==========================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT obtenido tras login exitoso.
        Incluir en header como: Authorization: Bearer {token}

  schemas:
    # ==========================================
    # SCHEMAS DE REQUEST
    # ==========================================

    RegistroPaso1Request:
      type: object
      required:
        - nombre_completo
        - documento
        - direccion
        - pais_residencia
        - email
      properties:
        nombre_completo:
          type: string
          example: Milagros Peledrotti
          minLength: 3
          maxLength: 100
        documento:
          type: string
          example: "35111222"
          description: DNI, CI, o documento equivalente
        direccion:
          type: string
          example: Av. Alvear 1820
          minLength: 5
        pais_residencia:
          type: string
          example: Argentina
        email:
          type: string
          format: email
          example: usuario@mail.com

    RegistroPaso2Request:
      type: object
      required:
        - registro_id
        - password
      properties:
        registro_id:
          type: integer
          example: 105
        password:
          type: string
          format: password
          example: "MiClave123!"
          minLength: 8
          description: Debe contener al menos 8 caracteres, una mayúscula y un número

    RegistroPaso3Request:
      type: object
      required:
        - registro_id
        - dni_frente
        - dni_dorso
      properties:
        registro_id:
          type: integer
          example: 105
        dni_frente:
          type: string
          format: binary
          description: Imagen del frente del DNI (JPG, PNG, PDF)
        dni_dorso:
          type: string
          format: binary
          description: Imagen del dorso del DNI (JPG, PNG, PDF)

    RegistroPaso4Request:
      type: object
      required:
        - registro_id
        - tipo_pago
        - detalles
      properties:
        registro_id:
          type: integer
          example: 105
        tipo_pago:
          type: string
          enum: [CUENTA_BANCARIA, TARJETA, CHEQUE]
        detalles:
          oneOf:
            - $ref: "#/components/schemas/DetallesCuentaBancaria"
            - $ref: "#/components/schemas/DetallesTarjeta"
            - $ref: "#/components/schemas/DetallesCheque"
          discriminator:
            propertyName: tipo_pago

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: usuario@mail.com
        password:
          type: string
          format: password
          example: "MiClave123!"

    RecuperarClaveRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: usuario@mail.com

    AgregarMedioPagoRequest:
      type: object
      required:
        - tipo_pago
        - detalles
      properties:
        tipo_pago:
          type: string
          enum: [CUENTA_BANCARIA, TARJETA, CHEQUE]
        detalles:
          type: object
          description: Objeto con detalles específicos según el tipo de pago

    RealizarPujaRequest:
      type: object
      required:
        - item_id
        - monto_ofertado
      properties:
        item_id:
          type: string
          example: uuid-item-442
        monto_ofertado:
          type: number
          example: 51000000
          minimum: 0
