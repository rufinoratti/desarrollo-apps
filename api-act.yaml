  # 5. MOTOR DE PUJAS
  # ==========================================

  /items/{id}/pujas:
    get:
      tags:
        - 5. Motor de Pujas
      summary: Historial y estado de pujas del artículo
      description: |
        Endpoint de consulta rápida para obtener:
        - Oferta actual más alta
        - Tiempo restante de la subasta
        - Historial completo de pujas
        - Total de participantes
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID del artículo/ítem
          required: true
          schema:
            type: string
            example: "uuid-item-442"
      responses:
        "200":
          description: Historial de pujas obtenido correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstadoPujas"
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Artículo no encontrado
          content:
            application/json:
